<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tâche 1 – Mémoire</title>
<style>
:root{--bg1:#020e1a;--bg2:#061f35;--card:#0b4f80;--accent:#8a2cff;--accent2:#b266ff;--success:#1fa36a}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,var(--bg2),var(--bg1));font-family:Arial,sans-serif;color:#e8f4ff;display:flex;justify-content:center;align-items:center}
.container{width:95%;max-width:520px;text-align:center;padding:20px;border-radius:16px;background:rgba(10,20,40,.4);box-shadow:0 0 25px rgba(138,44,255,.25)}
h1{color:#fff;text-shadow:0 0 5px var(--accent),0 0 15px var(--accent),0 0 30px var(--accent2)}
.board{margin-top:20px;display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.card{height:70px;background:linear-gradient(145deg,var(--card),#06355a);border-radius:12px;font-size:2rem;display:flex;justify-content:center;align-items:center;cursor:pointer;color:transparent;user-select:none;box-shadow:0 6px 14px rgba(0,0,0,.6),0 0 10px rgba(138,44,255,.2);transition:.25s}
.card:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 8px 18px rgba(0,0,0,.8),0 0 18px rgba(138,44,255,.6)}
.card.flipped{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;text-shadow:0 0 8px #fff;box-shadow:0 0 20px var(--accent)}
.card.matched{background:var(--success);box-shadow:0 0 18px #1fa36a}
.status{margin-top:15px;font-size:1.3rem;font-weight:bold;text-shadow:0 0 10px rgba(138,44,255,.7)}
.timer{margin-top:8px;font-size:1.3rem;color:var(--accent2);text-shadow:0 0 8px var(--accent)}
.score{margin-top:6px;color:#ffd700;font-weight:bold;text-shadow:0 0 8px #ffd700}
</style>
</head>
<body>
<div class="container">
<h1>🧠 Tâche 1 – Mémoire</h1>
<div class="board" id="board"></div>
<div class="status" id="status">Bonne chance 🍀</div>
<div class="timer" id="timer">Temps : 0:25</div>
<div class="score" id="score">Score : 0</div>
</div>

<script>
// ===== CONFIG G3 =====
const G3 = {
  coinValue: 10,
  probabilities: { lose: 0.55, small: 0.25, big: 0.15, jackpot: 0.05 },
  rewards: { lose: 0, small: 50, big: 340, jackpot: 500 },
  maxDailyCoins: 500,
  maxDailyTries: 1
};

// ===== USER =====
let user = JSON.parse(localStorage.getItem("user"));
if(!user){ alert("Connexion requise"); location.href="accueil.html"; }
user.coins = Number(user.coins||0);

// ===== DAILY TASK ====
const today = new Date().toDateString();
let daily = JSON.parse(localStorage.getItem("dailyTasks"))||{date:today,tasks:{}};
if(daily.date!==today) daily={date:today,tasks:{}};
const taskKey="task1";
if(!daily.tasks[taskKey]) daily.tasks[taskKey]=0;
if(daily.tasks[taskKey]>=G3.maxDailyTries){
  alert("🔒 Essai déjà utilisé aujourd’hui"); location.href="taches.html";
}

// ===== MEMORY GAME =====
const VALUES='AABBCCDDEEFFGGHHIIJJKKLL'.split('');
let flipped=[],matched=[],locked=false,time=25,interval,score=0;

const board=document.getElementById("board"),statusEl=document.getElementById("status"),
timerEl=document.getElementById("timer"),scoreEl=document.getElementById("score");

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function createBoard(){shuffle([...VALUES]).forEach(v=>{const c=document.createElement("div");c.className="card";c.dataset.value=v;c.onclick=()=>flip(c);board.appendChild(c)});startTimer()}
function flip(card){if(locked||card.classList.contains("flipped")||card.classList.contains("matched"))return;locked=true;card.classList.add("flipped");card.textContent=card.dataset.value;flipped.push(card);if(flipped.length===2)setTimeout(checkMatch,600);else locked=false}
function checkMatch(){const[a,b]=flipped;if(a.dataset.value===b.dataset.value){a.classList.add("matched");b.classList.add("matched");matched.push(a,b);score+=100}else{[a,b].forEach(c=>{c.classList.remove("flipped");c.textContent=""})}flipped=[];locked=false;scoreEl.textContent="Score : "+score;if(matched.length===VALUES.length)endGame()}
function startTimer(){timerEl.textContent="Temps : 0:"+time;interval=setInterval(()=>{time--;timerEl.textContent="Temps : 0:"+(time<10?"0"+time:time);if(time<=0)endGame()},1000)}
function rollOutcome(){const r=Math.random();if(r<G3.probabilities.lose)return"lose";if(r<G3.probabilities.lose+G3.probabilities.small)return"small";if(r<G3.probabilities.lose+G3.probabilities.small+G3.probabilities.big)return"big";return"jackpot"}
function computeReward(score){const outcome=rollOutcome();let coins=G3.rewards[outcome];coins+=Math.floor(score/50);return {outcome,coins,fc:coins*G3.coinValue}}
function endGame(){clearInterval(interval);const reward=computeReward(score);user.coins+=reward.coins;if(user.coins>G3.maxDailyCoins)user.coins=G3.maxDailyCoins;user.fc=user.coins*G3.coinValue;daily.tasks[taskKey]++;localStorage.setItem("dailyTasks",JSON.stringify(daily));localStorage.setItem("user",JSON.stringify(user));statusEl.textContent=reward.coins>0?reward.outcome+" : +"+reward.coins+" coins":"Pas de gain cette fois 😢";setTimeout(()=>location.href="taches.html",3000)}
createBoard();
</script>
</body>
</html>
