<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tâche 3 – Mode Impossible</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;background:radial-gradient(circle at top,#0a0018,#000);font-family:Arial,sans-serif;color:white;display:flex;justify-content:center;align-items:center;min-height:100vh}
.game{background:#0e0224;padding:28px;border-radius:20px;width:460px;max-width:95%;text-align:center;box-shadow:0 0 60px rgba(255,0,200,.25)}
h1{color:#ff2bd6}
.timer{font-size:1.3rem;font-weight:bold;color:#ffd166;margin-bottom:12px}
.board{display:flex;justify-content:space-between;margin:30px 0}
.card{width:72px;height:130px;border-radius:16px;cursor:pointer;transition:.25s;background:linear-gradient(145deg,#1a0033,#2a0055);border:1px solid rgba(255,0,200,.6)}
.card.reveal-black{background:#000}
.card.reveal-red{background:#ff0033}
.message{margin-top:18px;font-weight:bold}
.success{color:#00ffb3}.fail{color:#ff4d6d}
</style>
</head>
<body>
<div class="game">
<h1>☠️ MODE IMPOSSIBLE</h1>
<div class="timer" id="timer">⏱️ 30s</div>
<p id="info">🎴 5 cartes · trouve la rouge<br>🎯 1 essai / jour</p>
<div class="board" id="board"></div>
<div class="message" id="msg"></div>
</div>

<script>
const G3={coinValue:10,probabilities:{lose:0.55,small:0.25,big:0.15,jackpot:0.05},rewards:{lose:0,small:50,big:340,jackpot:500},maxDailyCoins:500,maxDailyTries:1};
let user=JSON.parse(localStorage.getItem("user"));if(!user){alert("Connexion requise");location.href="index.html"} user.coins=Number(user.coins||0);
const today=new Date().toDateString();
let daily=JSON.parse(localStorage.getItem("dailyTasks"))||{date:today,tasks:{}}; if(daily.date!==today)daily={date:today,tasks:{}};
const taskKey="task3"; if(!daily.tasks[taskKey])daily.tasks[taskKey]=0;if(daily.tasks[taskKey]>=G3.maxDailyTries){document.getElementById("msg").innerHTML="<span class='fail'>🔒 Déjà joué aujourd’hui</span>";throw"stop"}

let redIndex,cards=[],locked=false,time=30,timer;
const board=document.getElementById("board"),msg=document.getElementById("msg");

function start(){board.innerHTML="";cards=[];locked=false;time=30;redIndex=Math.floor(Math.random()*5);for(let i=0;i<5;i++){const c=document.createElement("div");c.className="card";c.onclick=()=>choose(i);board.appendChild(c);cards.push(c)}
timer=setInterval(()=>{time--;document.getElementById("timer").innerText="⏱️ "+time+"s";if(time<=0)finish(false)},1000)}
function choose(index){if(locked)return;locked=true;clearInterval(timer);cards.forEach((c,i)=>c.classList.add(i===redIndex?"reveal-red":"reveal-black"));setTimeout(()=>finish(index===redIndex),600)}
function rollOutcome(){const r=Math.random();if(r<G3.probabilities.lose)return"lose";if(r<G3.probabilities.lose+G3.probabilities.small)return"small";if(r<G3.probabilities.lose+G3.probabilities.small+G3.probabilities.big)return"big";return"jackpot"}
function computeReward(){const outcome=rollOutcome();const coins=G3.rewards[outcome];return{outcome,coins,fc:coins*G3.coinValue}}
function finish(win){clearInterval(timer);const reward=computeReward();user.coins+=reward.coins;if(user.coins>G3.maxDailyCoins)user.coins=G3.maxDailyCoins;user.fc=user.coins*G3.coinValue;daily.tasks[taskKey]++;localStorage.setItem("dailyTasks",JSON.stringify(daily));localStorage.setItem("user",JSON.stringify(user));msg.innerHTML=reward.coins>0?`<span class='success'>${reward.outcome} +${reward.coins} coins</span>`:"<span class='fail'>Perdu +0</span>";setTimeout(()=>location.href="taches.html",2500)}
start();
</script>
</body>
</html>
