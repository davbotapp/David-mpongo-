<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P1 - Pack N3</title>

<style>
body{
  font-family:Arial;
  background:#000;
  color:white;
  padding:20px;
}
h2{
  text-align:center;
}
.file{
  background:#1e88e5;
  padding:15px;
  margin-bottom:12px;
  border-radius:12px;
}
button{
  padding:6px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-right:5px;
}
.copy{
  background:gold;
}
.view{
  background:#00e5ff;
}

.linkBox{
  background:#111;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  word-break:break-all;
}
</style>
</head>
<body>

<h2>📦 Pack M30 - 30 jours</h2>
<div id="filesContainer"></div>

<script src="config.js"></script>

<script>

// 🔐 Vérification connexion
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  alert("Vous devez vous connecter !");
  window.location.href = "accueil.html";
}

// =====================
// AFFICHAGE PRODUIT
// =====================

const tokenType = "M30";
const container = document.getElementById("filesContainer");

if(window.PRODUCTS_CONFIG && window.PRODUCTS_CONFIG.tokens[tokenType]){
  const product = window.PRODUCTS_CONFIG.tokens[tokenType];

  product.files.forEach(file=>{
    const div = document.createElement("div");
    div.className = "file";

    div.innerHTML = `
      <h4>${file.title}</h4>
      <p>${file.detail}</p>

      <button class="view" onclick="viewLink(this,'${file.link}')">Voir</button>
      <button class="copy" onclick="copyLink('${file.link}')">Copier</button>

      <div class="linkBox" style="display:none"></div>
    `;

    container.appendChild(div);
  });

}else{
  container.innerHTML = "<p>Produit introuvable</p>";
}

// 👁 Voir le fichier
function viewLink(btn,link){
  const box = btn.parentElement.querySelector(".linkBox");
  box.style.display="block";
  box.innerText = link;
}

// 📋 Copier
function copyLink(link){
  navigator.clipboard.writeText(link);
  alert("Lien copié !");
}

</script>

</body>
</html>
