<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil | Davbot</title>
<style>
:root{
  --bg:#050816;
  --bg2:#0a0f25;
  --card:#0f1e3d;
  --accent:#4fc3f7;
  --accent2:#7c3aed;
  --neon1:#00e5ff;
  --neon2:#9d4edd;
  --danger:#ff4c4c;
  --gold:#ffd700;
}

/* ===== FOND GLOBAL ANIMÉ ===== */
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,229,255,.08), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(157,78,221,.08), transparent 40%),
    linear-gradient(135deg,var(--bg),var(--bg2));
  color:white;
  text-align:center;
  overflow-x:hidden;
}

/* HALO AMBIANT */
body::before{
  content:"";
  position:fixed;
  inset:-40%;
  background:
    radial-gradient(circle at 30% 30%, rgba(0,229,255,.15), transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(157,78,221,.15), transparent 40%);
  animation:ambientGlow 15s ease-in-out infinite alternate;
  z-index:-1;
}

@keyframes ambientGlow{
  from{transform:scale(1) rotate(0deg);}
  to{transform:scale(1.2) rotate(20deg);}
}

/* ===== NAVBAR NÉON ===== */
nav{
  display:flex;
  justify-content:space-around;
  padding:14px;
  background:rgba(10,26,58,.7);
  backdrop-filter:blur(10px);
  box-shadow:0 0 20px rgba(0,229,255,.3);
}

nav a{
  color:white;
  text-decoration:none;
  font-weight:bold;
  text-shadow:0 0 10px rgba(0,229,255,.8);
  transition:.3s;
}

nav a:hover{
  text-shadow:
    0 0 18px rgba(0,229,255,1),
    0 0 30px rgba(157,78,221,.8);
}

/* ===== CONTAINER ===== */
.container{
  max-width:600px;
  margin:25px auto;
  padding:15px;
  border-radius:20px;
  backdrop-filter:blur(6px);
}

/* ===== CARDS ===== */
.card{
  background:rgba(15,30,61,.7);
  border-radius:20px;
  padding:22px;
  margin-bottom:22px;
  border:1px solid rgba(79,195,247,.25);
  box-shadow:
    0 0 20px rgba(0,229,255,.25),
    0 0 60px rgba(124,58,237,.15),
    inset 0 0 15px rgba(255,255,255,.05);
  transition:.35s;
}

.card:hover{
  transform:translateY(-4px) scale(1.01);
  box-shadow:
    0 0 30px rgba(0,229,255,.45),
    0 0 70px rgba(124,58,237,.25);
}

/* ===== PHOTO PROFIL ===== */
#profilePic{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid var(--neon1);
  margin-bottom:12px;
  box-shadow:0 0 20px rgba(0,229,255,.8);
  position:relative;
}

#profilePic::after{
  content:"";
  position:absolute;
  inset:-10px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(0,229,255,.6), transparent 60%);
  filter:blur(12px);
  z-index:-1;
}

/* ===== TITRES ===== */
h2, h3{
  text-shadow:
    0 0 12px rgba(0,229,255,.8),
    0 0 25px rgba(157,78,221,.6);
}

/* ===== STATS ===== */
.stat{
  background:#08162d;
  border-radius:14px;
  padding:14px;
  margin:10px 0;
  font-weight:bold;
  box-shadow:
    inset 0 0 10px rgba(0,229,255,.25),
    0 0 10px rgba(0,0,0,.5);
}

/* ===== BOUTONS ===== */
.btn{
  width:100%;
  padding:15px;
  margin:10px 0;
  border:none;
  border-radius:14px;
  font-size:1rem;
  font-weight:bold;
  color:white;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:.3s;
}

/* Bouton énergie */
.btn::before{
  content:"";
  position:absolute;
  inset:-3px;
  background:linear-gradient(120deg,var(--neon1),var(--neon2),var(--neon1));
  opacity:.4;
  filter:blur(10px);
  animation:btnPulse 5s linear infinite;
  z-index:-1;
}

@keyframes btnPulse{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

.btn-task{
  background:linear-gradient(135deg,#4fc3f7,#7c3aed);
  box-shadow:0 0 20px rgba(0,229,255,.6);
}

.btn-withdraw{
  background:linear-gradient(135deg,#6dd5fa,#8e2de2);
  box-shadow:0 0 20px rgba(157,78,221,.6);
}

.btn-logout{
  background:linear-gradient(135deg,#ff4c4c,#c62828);
  box-shadow:0 0 20px rgba(255,76,76,.6);
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:
    0 0 30px rgba(0,229,255,.9),
    0 0 60px rgba(157,78,221,.7);
}

/* ===== BADGE VIP ===== */
.vipBadge{
  display:inline-block;
  margin-top:8px;
  padding:6px 14px;
  border-radius:12px;
  background:linear-gradient(135deg,#ffd700,#ff9800);
  color:#000;
  font-weight:bold;
  box-shadow:
    0 0 15px rgba(255,215,0,.8),
    0 0 30px rgba(255,152,0,.6);
}

/* ===== TEXTE MOTIVATION ===== */
#motivation{
  margin-top:8px;
  color:#ffd166;
  font-weight:bold;
  text-shadow:0 0 15px rgba(255,209,102,.8);
}

/* ===== PARTICULES ===== */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background-image:
    radial-gradient(rgba(255,255,255,.08) 1px, transparent 1px);
  background-size:40px 40px;
  opacity:.15;
  pointer-events:none;
  animation:gridMove 30s linear infinite;
}

@keyframes gridMove{
  from{transform:translateY(0);}
  to{transform:translateY(-40px);}
}
</style>
</head>

<body>
<nav>
  <a href="accueil.html">Accueil</a>
   <a href="taches.html">Tâches</a>
  <a href="profil.html">Profil</a>
  <a href="vip.html">VIP</a>
</nav>

<div class="container">

  <!-- PROFIL -->
  <div class="card">
    <img id="profilePic">
    <h2 id="userName"></h2>
    <div id="vipBadgeContainer"></div>
    <p id="motivation"></p>
  </div>

  <!-- STATS -->
  <div class="card">
    <h3 style="color:#4fc3f7">Mes statistiques</h3>
    <div class="stat">🪙 Coins totaux : <span id="coins">0</span></div>
    <div class="stat">💵 Valeur totale : <span id="fc">0</span> FC</div>
    <div class="stat">🎟️ Jeton : <span id="jetonType"></span></div>
    <div class="stat">📊 Plafond : <span id="plafond"></span> coins</div>
    <div class="stat">🎟️ Statut : <span id="status"></span></div>
    <div class="stat">⏰ Expiration : <span id="expiry"></span></div>
    <div class="stat">✨ Points fidélité : <span id="fidelite">0</span></div>
  </div>

  <!-- ACTIONS -->
  <div class="card">
    <button class="btn btn-task" id="taskBtn">🎯 Faire les tâches</button>
    <button class="btn btn-withdraw" id="productBtn">🛒 Produits</button>
    <button class="btn btn-withdraw" id="withdrawBtn">💬 Demander un retrait</button>
    <button class="btn btn-logout" onclick="logout()">🚪 Déconnexion</button>
  </div>

</div>

<script>
// ===== USER =====
let user = JSON.parse(localStorage.getItem("user"));
if(!user){ alert("Veuillez vous connecter"); location.href="accueil.html"; }
user.coins = Number(user.coins||0);
user.fc = Number(user.fc||0);
user.pointsFidelite = Number(user.pointsFidelite||0);

// ===== EXPIRATION =====
const tokensCfg = {G3:3,N3:3,P7:7,M30:30};
if(user.tokenStart && user.activeToken){
  const start=new Date(user.tokenStart);
  const expiry=new Date(start);
  expiry.setDate(expiry.getDate() + (tokensCfg[user.activeToken]||0));
  document.getElementById("expiry").innerText = expiry.toLocaleString();
  if(new Date()>=expiry){
    alert("⏰ Votre jeton a expiré."); localStorage.removeItem("user"); location.href="index.html";
  }
}

// ===== AFFICHAGE =====
document.getElementById("profilePic").src = user.photo || "https://via.placeholder.com/120";
document.getElementById("userName").innerText = user.name;
document.getElementById("coins").innerText = user.coins;
document.getElementById("fc").innerText = user.fc;
document.getElementById("jetonType").innerText = user.activeToken;
document.getElementById("plafond").innerText = user.tokenMax||"-";
document.getElementById("status").innerText = user.premium?"🌟 Premium":"👤 Normal";
document.getElementById("fidelite").innerText = user.pointsFidelite||0;

// ===== VIP =====
if(user.vipProgress && user.vipProgress.unlocked){
  document.getElementById("vipBadgeContainer").innerHTML = "<div class='vipBadge'>💎 COMPTE VIP</div>";
}

// ===== MOTIVATION =====
let messages = user.premium? ["💎 Mode élite activé.","🚀 Niveau supérieur.","🔥 Mentalité gagnante."] : ["🔥 Continue.","💪 Discipline.","⚡ Tu progresses."];
document.getElementById("motivation").innerText = messages[Math.floor(Math.random()*messages.length)];

// ===== BOUTONS =====
const taskBtn = document.getElementById("taskBtn");
const productBtn = document.getElementById("productBtn");
const withdrawBtn = document.getElementById("withdrawBtn");

const TOKENS_TASK = ["G3"];
const TOKENS_PRODUCTS = ["N3","P7","M30"];

// Tâches
if(!TOKENS_TASK.includes(user.activeToken)){
  taskBtn.disabled=true; taskBtn.title="⛔ Seul le jeton G permet d'accéder aux tâches";
} else { taskBtn.onclick=()=> location.href="taches.html"; }

// Produits
if(!TOKENS_PRODUCTS.includes(user.activeToken)){
  productBtn.disabled=true; productBtn.title="⛔ Seul un jeton N/P/M permet d'accéder aux produits";
} else { productBtn.onclick=()=> location.href="produits.html"; }

// Retrait (coins/FC)
withdrawBtn.onclick = ()=>{
  if(!TOKENS_TASK.includes(user.activeToken)){
    alert("⛔ Retrait non disponible pour ce jeton"); return;
  }
  if(user.fc<500){ alert("❌ Minimum 500 FC"); return; }
  const msg = `Bonjour Davbot,\nDemande de retrait\nNom : ${user.name}\nCoins : ${user.coins}\nMontant : ${user.fc} FC\nVIP : ${user.vipProgress?.unlocked?"Oui":"Non"}`;
  window.open("https://wa.me/243800182016?text="+encodeURIComponent(msg), "_blank");
};

// Logout
function logout(){ if(confirm("Se déconnecter ?")){ localStorage.removeItem("user"); location.href="index.html"; } }

// ===== POINTS FIDÉLITÉ QUOTIDIEN =====
if(TOKENS_PRODUCTS.includes(user.activeToken)){
  user.pointsFidelite = (user.pointsFidelite||360) + 1.5; // 1.5points par jour
  localStorage.setItem("user", JSON.stringify(user));
  document.getElementById("fidelite").innerText = user.pointsFidelite;
}
</script>
</body>
</html>
